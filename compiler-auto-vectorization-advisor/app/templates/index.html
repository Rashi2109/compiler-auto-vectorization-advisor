<!DOCTYPE html>
<html>

<head>

    <title>Compiler Auto-Vectorization Advisor</title>

    <style>

        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Compiler Auto-Vectorization Advisor</h1>

    <form action="/analyze" method="POST" enctype="multipart/form-data">

        <input type="file" name="codefile" required>

        <br><br>

        <button type="submit">Analyze Code</button>

    </form>

</div>

</body>

</html>
